name: Deploy Beacon Studio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Publish ONLY the customer-facing web app (demos/) as the site root.
      # All paths inside demos/ are relative, so the /<repo>/ subpath works.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demos

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
