<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — reconnecting…</title>
<meta name="theme-color" content="#070710">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/demo.css">
<style>
  body.t-studio{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
  .off{position:relative;z-index:2;max-width:460px}
  .off .mk{width:64px;height:64px;border-radius:18px;margin:0 auto 22px;display:grid;place-items:center;
    font-family:var(--display);font-weight:800;font-size:1.7rem;color:#04121f;
    background:linear-gradient(135deg,var(--brand),var(--brand-2));box-shadow:0 16px 40px -12px var(--brand)}
  .off h1{font-family:var(--display);font-size:clamp(1.6rem,5vw,2.2rem);margin-bottom:12px}
  .off p{color:var(--muted);margin-bottom:26px}
  .off .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--brand);
    margin-right:8px;animation:pulse 2s infinite}
</style>
</head>
<body class="t-studio">
<div class="off">
  <div class="mk">B</div>
  <h1>You're offline</h1>
  <p><span class="dot"></span>We can't reach the network right now. Your booking is safe — reconnect and tap retry to pick up where you left off.</p>
  <button class="btn btn-primary" onclick="location.reload()">Retry connection →</button>
</div>
<script>
  // Auto-retry the moment the browser regains connectivity.
  window.addEventListener('online', function () { location.reload(); });
</script>
</body>
</html>
